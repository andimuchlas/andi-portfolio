<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRSYS 9400 - Andi Muchlas Ramadani</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/monitor.css">
    <link rel="stylesheet" href="css/crt-hardware.css">
    <link rel="stylesheet" href="css/crt-phosphor.css">
    <link rel="stylesheet" href="css/dos-ui.css">
</head>
<body>
    <div id="room">
        <div id="monitor-assembly">
            <!-- Frame Overlay (uses image) -->
            <div class="monitor-frame-overlay"></div>

            <div class="screen-container">
                <div class="screen-glass">
                    <!-- Screen framing: Glow from screen to bezel -->
                    <div class="screen-glow-to-bezel"></div>
                    
                    <!-- CRT Hardware effects exactly like Videomator -->
                    <div class="cristal"></div>
                    <div class="scanline"></div>
                    <div class="scanline1"></div>
                    <div class="dirt-overlay"></div>
                    
                    <!-- Content Area -->
                    <div id="wipe-transition-layer">
                        <div id="terminal-content" class="phosphor-amber">
                            <div id="splash-screen" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                                <div id="power-btn" style="padding: 2vmin 4vmin; border: 2px solid #FFB000; cursor: pointer; font-size: 2vmin; transition: all 0.2s; background: rgba(0,0,0,0.5);">
                                    [ POWER ON ]
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden input to capture keyboard events consistently -->
    <input type="text" id="keyboard-capture" autocomplete="off" spellcheck="false" style="position: absolute; opacity: 0; top: -1000px;">

    <!-- Application Logic -->
    <script src="js/audio.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/sections/profile.js"></script>
    <script src="js/sections/experience.js"></script>
    <script src="js/sections/projects.js"></script>
    <script src="js/sections/skills.js"></script>
    <script src="js/sections/contact.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/boot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const powerBtn = document.getElementById('power-btn');
            const splash = document.getElementById('splash-screen');
            
            powerBtn.addEventListener('click', () => {
                window.Audio.init(); // Initialize audio context on click
                splash.style.display = 'none';
                document.getElementById('keyboard-capture').focus();
                window.BootManager.start();
            });

            document.body.addEventListener('click', () => {
                document.getElementById('keyboard-capture').focus();
            });
        });
    </script>
</body>
</html>
