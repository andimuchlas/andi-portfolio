<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRSYS 9400 - Andi Muchlas Ramadani</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/monitor.css">
    <link rel="stylesheet" href="css/crt-hardware.css">
    <link rel="stylesheet" href="css/crt-phosphor.css">
    <link rel="stylesheet" href="css/dos-ui.css">
    <link rel="icon" type="image/png" href="assets/img/logo/web-logo.png">
</head>

<body>
    <div id="room">
        <div id="monitor-assembly">
            <div class="monitor-frame-overlay"></div>

            <div class="screen-container">
                <div class="screen-glass">
                    <div class="screen-glow-to-bezel"></div>

                    <div class="cristal"></div>
                    <div class="scanline"></div>
                    <div class="scanline1"></div>
                    <div class="dirt-overlay"></div>

                    <div id="wipe-transition-layer">
                        <div id="terminal-content" class="phosphor-amber">
                            <div id="splash-screen"
                                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 6vmin;">
                                <img src="assets/img/logo/web-logo.png" alt="Logo"
                                    style="width: 40vmin; height: auto; opacity: 0.9; filter: grayscale(1) sepia(1) hue-rotate(15deg) saturate(3) brightness(1.2);">
                                <div id="power-btn"
                                    style="padding: 1vmin 6vmin; border: 3px solid #FFB000; cursor: pointer; font-size: 3vmin; transition: all 0.2s; background: rgba(0,0,0,0.9); text-align: center; width: 60vmin; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                                    [ POWER ON ]
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="text" id="keyboard-capture" autocomplete="off" spellcheck="false"
        style="position: absolute; opacity: 0; top: -1000px;">

    <script src="js/audio.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/sections/profile.js"></script>
    <script src="js/sections/experience.js"></script>
    <script src="js/sections/projects.js"></script>
    <script src="js/sections/skills.js"></script>
    <script src="js/sections/contact.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/boot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const powerBtn = document.getElementById('power-btn');
            const splash = document.getElementById('splash-screen');

            powerBtn.addEventListener('click', () => {
                window.Audio.init();
                splash.style.display = 'none';
                document.getElementById('keyboard-capture').focus();
                window.BootManager.start();
            });

            document.body.addEventListener('click', () => {
                document.getElementById('keyboard-capture').focus();
            });
        });
    </script>
</body>

</html>
